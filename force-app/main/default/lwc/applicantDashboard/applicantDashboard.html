<template>
    <lightning-card title="My Grant Applications" icon-name="standard:opportunity">
        <div slot="actions">
            <lightning-button 
                label="New Application" 
                variant="brand" 
                icon-name="utility:add"
                onclick={handleNewApplication}>
            </lightning-button>
        </div>

        <div class="slds-p-horizontal_medium">
            <template if:true={isLoading}>
                <div class="slds-p-around_large slds-text-align_center">
                    <lightning-spinner alternative-text="Loading applications"></lightning-spinner>
                </div>
            </template>

            <template if:false={isLoading}>
                <template if:true={error}>
                    <div class="slds-illustration slds-illustration_small slds-p-vertical_large slds-text-align_center">
                        <p class="slds-text-color_error">{error}</p>
                    </div>
                </template>

                <template if:false={error}>
                    <template if:true={hasApplications}>
                        <div class="slds-grid slds-wrap slds-gutters">
                            <template for:each={applications} for:item="app">
                                <div key={app.Id} class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-3 slds-p-bottom_medium">
                                    <article class="slds-card app-card">
                                        <div class="slds-card__header slds-grid">
                                            <header class="slds-media slds-media_center slds-has-flexi-truncate">
                                                <div class="slds-media__figure">
                                                    <lightning-icon icon-name="standard:document" size="small"></lightning-icon>
                                                </div>
                                                <div class="slds-media__body">
                                                    <h2 class="slds-card__header-title">
                                                        <span class="slds-text-heading_small slds-truncate">{app.Name}</span>
                                                    </h2>
                                                </div>
                                            </header>
                                            <div class="slds-no-flex">
                                                <span class={app.statusClass}>{app.Status__c}</span>
                                            </div>
                                        </div>
                                        <div class="slds-card__body slds-card__body_inner">
                                            <dl class="slds-dl_horizontal slds-text-body_small">
                                                <dt class="slds-dl_horizontal__label">Project:</dt>
                                                <dd class="slds-dl_horizontal__detail slds-truncate">{app.Project_Title__c}</dd>
                                                
                                                <dt class="slds-dl_horizontal__label">Submitted:</dt>
                                                <dd class="slds-dl_horizontal__detail">{app.formattedDate}</dd>
                                                
                                                <dt class="slds-dl_horizontal__label">Requested:</dt>
                                                <dd class="slds-dl_horizontal__detail">
                                                    <lightning-formatted-number 
                                                        value={app.Amount_Requested__c} 
                                                        format-style="currency" 
                                                        currency-code="USD">
                                                    </lightning-formatted-number>
                                                </dd>
                                                
                                                <template if:true={app.hasAward}>
                                                    <dt class="slds-dl_horizontal__label award-label">Award:</dt>
                                                    <dd class="slds-dl_horizontal__detail award-amount">
                                                        <lightning-formatted-number 
                                                            value={app.Award_Amount__c} 
                                                            format-style="currency" 
                                                            currency-code="USD">
                                                        </lightning-formatted-number>
                                                    </dd>
                                                </template>
                                            </dl>
                                        </div>
                                        <footer class="slds-card__footer">
                                            <lightning-button 
                                                label="View Details" 
                                                variant="base"
                                                data-id={app.Id}
                                                onclick={handleViewDetails}>
                                            </lightning-button>
                                        </footer>
                                    </article>
                                </div>
                            </template>
                        </div>
                    </template>

                    <template if:false={hasApplications}>
                        <div class="slds-illustration slds-illustration_small slds-p-vertical_x-large slds-text-align_center">
                            <lightning-icon icon-name="utility:document" size="large" class="slds-m-bottom_medium"></lightning-icon>
                            <h3 class="slds-text-heading_medium slds-m-bottom_small">No Applications Yet</h3>
                            <p class="slds-text-body_regular slds-m-bottom_medium">{noApplicationsMessage}</p>
                            <lightning-button 
                                label="Start New Application" 
                                variant="brand"
                                onclick={handleNewApplication}>
                            </lightning-button>
                        </div>
                    </template>
                </template>
            </template>
        </div>
    </lightning-card>

    <template if:true={showDetailModal}>
        <section role="dialog" tabindex="-1" aria-modal="true" class="slds-modal slds-fade-in-open slds-modal_large">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" onclick={closeDetailModal}>
                        <lightning-icon icon-name="utility:close" alternative-text="Close" size="small"></lightning-icon>
                    </button>
                    <h2 class="slds-modal__title">Application Details: {selectedApplication.Name}</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <template if:true={showReviewerComments}>
                        <div class="slds-notify slds-notify_alert slds-alert_error slds-m-bottom_medium" role="alert">
                            <lightning-icon icon-name="utility:error" size="small" class="slds-m-right_small"></lightning-icon>
                            <h2>Application Rejected</h2>
                            <p class="slds-m-top_x-small">{selectedApplication.Reviewer_Comments__c}</p>
                        </div>
                    </template>

                    <template if:true={showAwardDetails}>
                        <div class="slds-notify slds-notify_alert slds-alert_success slds-m-bottom_medium" role="alert">
                            <lightning-icon icon-name="utility:success" size="small" class="slds-m-right_small"></lightning-icon>
                            <h2>Congratulations! Your application has been approved.</h2>
                            <p class="slds-m-top_x-small slds-text-heading_medium">
                                Award Amount: 
                                <lightning-formatted-number 
                                    value={selectedApplication.Award_Amount__c} 
                                    format-style="currency" 
                                    currency-code="USD">
                                </lightning-formatted-number>
                            </p>
                        </div>
                    </template>

                    <div class="slds-grid slds-gutters slds-wrap">
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                            <h3 class="slds-text-heading_small slds-m-bottom_small">Organization Information</h3>
                            <dl class="slds-dl_horizontal">
                                <dt class="slds-dl_horizontal__label">Organization:</dt>
                                <dd class="slds-dl_horizontal__detail">{selectedApplication.Organization_Name__c}</dd>
                                
                                <dt class="slds-dl_horizontal__label">Type:</dt>
                                <dd class="slds-dl_horizontal__detail">{selectedApplication.Organization_Type__c}</dd>
                                
                                <dt class="slds-dl_horizontal__label">Year Founded:</dt>
                                <dd class="slds-dl_horizontal__detail">{selectedApplication.Year_Founded__c}</dd>
                                
                                <dt class="slds-dl_horizontal__label">Annual Budget:</dt>
                                <dd class="slds-dl_horizontal__detail">
                                    <lightning-formatted-number 
                                        value={selectedApplication.Annual_Budget__c} 
                                        format-style="currency" 
                                        currency-code="USD">
                                    </lightning-formatted-number>
                                </dd>
                            </dl>
                        </div>

                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                            <h3 class="slds-text-heading_small slds-m-bottom_small">Project Information</h3>
                            <dl class="slds-dl_horizontal">
                                <dt class="slds-dl_horizontal__label">Project Title:</dt>
                                <dd class="slds-dl_horizontal__detail">{selectedApplication.Project_Title__c}</dd>
                                
                                <dt class="slds-dl_horizontal__label">Category:</dt>
                                <dd class="slds-dl_horizontal__detail">{selectedApplication.Project_Category__c}</dd>
                                
                                <dt class="slds-dl_horizontal__label">Amount Requested:</dt>
                                <dd class="slds-dl_horizontal__detail">
                                    <lightning-formatted-number 
                                        value={selectedApplication.Amount_Requested__c} 
                                        format-style="currency" 
                                        currency-code="USD">
                                    </lightning-formatted-number>
                                </dd>
                                
                                <dt class="slds-dl_horizontal__label">Total Cost:</dt>
                                <dd class="slds-dl_horizontal__detail">
                                    <lightning-formatted-number 
                                        value={selectedApplication.Total_Project_Cost__c} 
                                        format-style="currency" 
                                        currency-code="USD">
                                    </lightning-formatted-number>
                                </dd>
                                
                                <dt class="slds-dl_horizontal__label">Beneficiaries:</dt>
                                <dd class="slds-dl_horizontal__detail">{selectedApplication.Num_Beneficiaries__c}</dd>
                            </dl>
                        </div>

                        <div class="slds-col slds-size_1-of-1 slds-m-top_medium">
                            <h3 class="slds-text-heading_small slds-m-bottom_small">Project Description</h3>
                            <p class="slds-text-body_regular">{selectedApplication.Project_Description__c}</p>
                        </div>

                        <template if:true={eligibilityRules.length}>
                            <div class="slds-col slds-size_1-of-1 slds-m-top_medium">
                                <h3 class="slds-text-heading_small slds-m-bottom_small">Eligibility Status</h3>
                                <div class="slds-box slds-theme_shade">
                                    <div class="slds-grid slds-wrap">
                                        <template for:each={eligibilityRules} for:item="rule">
                                            <div key={rule.ruleId} class="slds-col slds-size_1-of-2 slds-p-vertical_xx-small">
                                                <lightning-icon 
                                                    icon-name={rule.iconName} 
                                                    size="x-small"
                                                    class="slds-m-right_x-small">
                                                </lightning-icon>
                                                <span><strong>{rule.ruleName}:</strong> {rule.message}</span>
                                            </div>
                                        </template>
                                    </div>
                                </div>
                            </div>
                        </template>

                        <template if:true={awardBreakdown}>
                            <div class="slds-col slds-size_1-of-1 slds-m-top_medium">
                                <h3 class="slds-text-heading_small slds-m-bottom_small">Award Calculation Details</h3>
                                <div class="slds-box award-box">
                                    <table class="slds-table slds-table_bordered">
                                        <thead>
                                            <tr>
                                                <th>Factor</th>
                                                <th>Score</th>
                                                <th>Details</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <template for:each={awardBreakdown.factors} for:item="factor">
                                                <tr key={factor.factorName}>
                                                    <td>{factor.factorName}</td>
                                                    <td>{factor.score} / {factor.maxScore}</td>
                                                    <td>{factor.detail}</td>
                                                </tr>
                                            </template>
                                        </tbody>
                                        <tfoot>
                                            <tr>
                                                <td><strong>Total</strong></td>
                                                <td><strong>{awardBreakdown.totalScore} / {awardBreakdown.maxScore}</strong></td>
                                                <td><strong>{awardBreakdown.awardPercentage}%</strong></td>
                                            </tr>
                                        </tfoot>
                                    </table>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
                <footer class="slds-modal__footer">
                    <lightning-button label="Close" onclick={closeDetailModal}></lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
