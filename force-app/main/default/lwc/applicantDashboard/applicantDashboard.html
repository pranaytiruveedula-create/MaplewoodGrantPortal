<template>
    <template if:true={showApplicationForm}>
        <c-grant-application-form
            onapplicationsubmitted={handleApplicationSubmitted}
            onbacktodashboard={handleBackToDashboard}>
        </c-grant-application-form>
    </template>

    <template if:false={showApplicationForm}>
    <!-- Site Header -->
    <header class="site-header">
        <div class="header-container">
            <div class="header-brand">
                <div class="logo-icon">
                    <lightning-icon icon-name="custom:custom62" size="medium"></lightning-icon>
                </div>
                <div class="brand-text">
                    <h1 class="site-title">Maplewood County</h1>
                    <p class="site-subtitle">Community Development Grant Program</p>
                </div>
            </div>
            <div class="header-nav">
                <button class="logout-button" onclick={handleLogout}>
                    <lightning-icon icon-name="utility:logout" size="x-small"></lightning-icon>
                    <span>Logout</span>
                </button>
            </div>
        </div>
    </header>

    <div class="dashboard-container">
        <div class="dashboard-header">
            <div class="header-content">
                <h1 class="dashboard-title">My Grant Applications</h1>
                <p class="dashboard-subtitle">Track and manage your submitted applications</p>
            </div>
            <div class="header-actions">
                <button class="apply-button" onclick={handleNewApplication}>
                    <lightning-icon icon-name="utility:add" size="x-small"></lightning-icon>
                    <span>New Application</span>
                </button>
            </div>
        </div>

        <div class="dashboard-content">
            <template if:true={isLoading}>
                <div class="loading-container">
                    <lightning-spinner alternative-text="Loading applications" size="medium"></lightning-spinner>
                </div>
            </template>

            <template if:false={isLoading}>
                <template if:true={error}>
                    <div class="error-container">
                        <lightning-icon icon-name="utility:error" size="large"></lightning-icon>
                        <p class="error-message">{error}</p>
                    </div>
                </template>

                <template if:false={error}>
                    <template if:true={hasApplications}>
                        <div class="applications-grid">
                            <template for:each={applications} for:item="app">
                                <div key={app.Id} class="application-card">
                                    <div class="card-header">
                                        <div class="card-title-row">
                                            <lightning-icon icon-name="standard:document" size="small"></lightning-icon>
                                            <h2 class="card-title">{app.Name}</h2>
                                        </div>
                                        <span class={app.statusClass}>{app.Status__c}</span>
                                    </div>
                                    <div class="card-body">
                                        <div class="info-row">
                                            <span class="info-label">Project</span>
                                            <span class="info-value">{app.Project_Title__c}</span>
                                        </div>
                                        <div class="info-row">
                                            <span class="info-label">Submitted</span>
                                            <span class="info-value">{app.formattedDate}</span>
                                        </div>
                                        <div class="info-row">
                                            <span class="info-label">Requested</span>
                                            <span class="info-value">
                                                <lightning-formatted-number 
                                                    value={app.Amount_Requested__c} 
                                                    format-style="currency" 
                                                    currency-code="USD">
                                                </lightning-formatted-number>
                                            </span>
                                        </div>
                                        <template if:true={app.hasAward}>
                                            <div class="info-row award-row">
                                                <span class="info-label">Award</span>
                                                <span class="info-value award-value">
                                                    <lightning-formatted-number 
                                                        value={app.Award_Amount__c} 
                                                        format-style="currency" 
                                                        currency-code="USD">
                                                    </lightning-formatted-number>
                                                </span>
                                            </div>
                                        </template>
                                    </div>
                                    <div class="card-footer">
                                        <lightning-button 
                                            label="View Details" 
                                            variant="neutral"
                                            data-id={app.Id}
                                            onclick={handleViewDetails}>
                                        </lightning-button>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </template>

                    <template if:false={hasApplications}>
                        <div class="empty-state">
                            <div class="empty-icon">
                                <lightning-icon icon-name="utility:document" size="large"></lightning-icon>
                            </div>
                            <h3 class="empty-title">No Applications Yet</h3>
                            <p class="empty-message">Start your first grant application to support your community project.</p>
                            <button class="empty-cta" onclick={handleNewApplication}>
                                <lightning-icon icon-name="utility:add" size="x-small"></lightning-icon>
                                Apply Now
                            </button>
                        </div>
                    </template>
                </template>
            </template>
        </div>
    </div>

    <template if:true={showDetailModal}>
            <section role="dialog" tabindex="-1" aria-modal="true" class="slds-modal slds-fade-in-open slds-modal_large">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" onclick={closeDetailModal}>
                        <lightning-icon icon-name="utility:close" alternative-text="Close" size="small"></lightning-icon>
                    </button>
                    <h2 class="slds-modal__title">Application Details: {selectedApplication.Name}</h2>
                </header>
                <div class="slds-modal__content">
                    <template if:true={showReviewerComments}>
                        <div class="slds-notify slds-notify_alert slds-alert_error slds-m-bottom_medium" role="alert">
                            <h2>
                                <lightning-icon icon-name="utility:error" size="x-small"></lightning-icon>
                                Application Rejected
                            </h2>
                            <p>{selectedApplication.Reviewer_Comments__c}</p>
                        </div>
                    </template>

                    <template if:true={showAwardDetails}>
                        <div class="slds-notify slds-notify_alert slds-alert_success slds-m-bottom_medium" role="alert">
                            <h2>
                                <lightning-icon icon-name="utility:success" size="x-small"></lightning-icon>
                                Application Approved
                            </h2>
                            <p>
                                Congratulations! Your award amount is: 
                                <strong>
                                    <lightning-formatted-number 
                                        value={selectedApplication.Award_Amount__c} 
                                        format-style="currency" 
                                        currency-code="USD">
                                    </lightning-formatted-number>
                                </strong>
                            </p>
                        </div>
                    </template>

                    <div class="slds-grid slds-gutters slds-wrap">
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                            <h3 class="slds-text-heading_small slds-m-bottom_small">Organization Information</h3>
                            <dl class="slds-dl_horizontal">
                                <dt class="slds-dl_horizontal__label">Organization:</dt>
                                <dd class="slds-dl_horizontal__detail">{selectedApplication.Organization_Name__c}</dd>
                                
                                <dt class="slds-dl_horizontal__label">Type:</dt>
                                <dd class="slds-dl_horizontal__detail">{selectedApplication.Organization_Type__c}</dd>
                                
                                <dt class="slds-dl_horizontal__label">Year Founded:</dt>
                                <dd class="slds-dl_horizontal__detail">{selectedApplication.Year_Founded__c}</dd>
                                
                                <dt class="slds-dl_horizontal__label">Annual Budget:</dt>
                                <dd class="slds-dl_horizontal__detail">
                                    <lightning-formatted-number 
                                        value={selectedApplication.Annual_Budget__c} 
                                        format-style="currency" 
                                        currency-code="USD">
                                    </lightning-formatted-number>
                                </dd>
                            </dl>
                        </div>

                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                            <h3 class="slds-text-heading_small slds-m-bottom_small">Project Information</h3>
                            <dl class="slds-dl_horizontal">
                                <dt class="slds-dl_horizontal__label">Project Title:</dt>
                                <dd class="slds-dl_horizontal__detail">{selectedApplication.Project_Title__c}</dd>
                                
                                <dt class="slds-dl_horizontal__label">Category:</dt>
                                <dd class="slds-dl_horizontal__detail">{selectedApplication.Project_Category__c}</dd>
                                
                                <dt class="slds-dl_horizontal__label">Amount Requested:</dt>
                                <dd class="slds-dl_horizontal__detail">
                                    <lightning-formatted-number 
                                        value={selectedApplication.Amount_Requested__c} 
                                        format-style="currency" 
                                        currency-code="USD">
                                    </lightning-formatted-number>
                                </dd>
                                
                                <dt class="slds-dl_horizontal__label">Total Cost:</dt>
                                <dd class="slds-dl_horizontal__detail">
                                    <lightning-formatted-number 
                                        value={selectedApplication.Total_Project_Cost__c} 
                                        format-style="currency" 
                                        currency-code="USD">
                                    </lightning-formatted-number>
                                </dd>
                                
                                <dt class="slds-dl_horizontal__label">Beneficiaries:</dt>
                                <dd class="slds-dl_horizontal__detail">{selectedApplication.Num_Beneficiaries__c}</dd>
                            </dl>
                        </div>

                        <div class="slds-col slds-size_1-of-1 slds-m-top_medium">
                            <h3 class="slds-text-heading_small slds-m-bottom_small">Project Description</h3>
                            <p class="slds-text-body_regular">{selectedApplication.Project_Description__c}</p>
                        </div>

                        <template if:true={eligibilityRules.length}>
                            <div class="slds-col slds-size_1-of-1 slds-m-top_medium">
                                <h3 class="slds-text-heading_small slds-m-bottom_small">Eligibility Status</h3>
                                <div class="slds-box slds-theme_shade">
                                    <div class="slds-grid slds-wrap">
                                        <template for:each={eligibilityRules} for:item="rule">
                                            <div key={rule.ruleId} class="slds-col slds-size_1-of-2 slds-p-vertical_xx-small">
                                                <lightning-icon 
                                                    icon-name={rule.iconName} 
                                                    size="x-small"
                                                    class="slds-m-right_x-small">
                                                </lightning-icon>
                                                <span><strong>{rule.ruleName}:</strong> {rule.message}</span>
                                            </div>
                                        </template>
                                    </div>
                                </div>
                            </div>
                        </template>

                    </div>
                </div>
                <footer class="slds-modal__footer">
                    <lightning-button label="Close" onclick={closeDetailModal}></lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
    </template>
</template>
